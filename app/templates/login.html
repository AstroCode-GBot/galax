<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Saver Pro Matrix Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a, #020617); }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 rounded-3xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                ALL SAVER PRO
            </h1>
            <p class="text-gray-400 mt-2 text-sm">Authorized Administrative Gateway</p>
        </div>
        
        {% if error %}
        <div class="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-sm text-red-300 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Matrix Identity</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:outline-none transition text-white">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Access Key Code</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:outline-none transition text-white">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 font-bold rounded-xl shadow-lg shadow-indigo-600/30 transition duration-200">
                Authenticate Session
            </button>
        </form>
    </div>
</body>
</html>
