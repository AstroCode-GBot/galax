<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Saver Pro Matrix Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #111827, #030712);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen">
    <div class="flex">
        <aside class="w-64 glass h-screen sticky top-0 p-6 flex flex-col justify-between">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent mb-8">
                    ALL SAVER PRO
                </h1>
                <nav class="space-y-4">
                    <a href="/admin/dashboard" class="block p-3 rounded-xl glass hover:bg-white/10 transition">📊 Core Matrix</a>
                    <a href="/admin/users" class="block p-3 rounded-xl glass hover:bg-white/10 transition">👥 User Accounts</a>
                    <a href="/admin/downloads" class="block p-3 rounded-xl glass hover:bg-white/10 transition">📥 Download Ledger</a>
                    <a href="/admin/apis" class="block p-3 rounded-xl glass hover:bg-white/10 transition">🔌 API Routes</a>
                </nav>
            </div>
            <div class="text-xs text-gray-500">v2.4 Production Engine</div>
        </aside>

        <main class="flex-1 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
